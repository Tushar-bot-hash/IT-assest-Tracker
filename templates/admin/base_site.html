{% extends "admin/base.html" %}
{% load i18n %}

{% block title %}{% if subtitle %}{{ subtitle }} | {% endif %}{{ title }} | IT/HR Enterprise Tracker{% endblock %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}" style="display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #fb923c, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.15));">⚡</span>
        <span>IT/HR Enterprise Tracker Admin</span>
    </a>
</div>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    /* Premium Green & Orange Modern Admin Theme Override */
    :root {
        /* Color Palette Overrides */
        --primary: #064e3b !important;                  /* Deep emerald green */
        --primary-fg: #f8fafc !important;
        --secondary: #14532d !important;                /* Forest green */
        --secondary-fg: #f0fdf4 !important;
        --accent: #f97316 !important;                   /* Vibrant orange */
        --accent-fg: #ffffff !important;
        --link-fg: #15803d !important;                  /* Leaf green for links */
        --link-hover-color: #ea580c !important;         /* Darker orange on hover */
        
        --body-bg: #f8fafc !important;                  /* Clean light background */
        --body-fg: #1e293b !important;
        --border-color: #e2e8f0 !important;
        
        /* Button overrides */
        --button-bg: #ea580c !important;                /* Orange button */
        --button-hover-bg: #c2410c !important;
        --button-fg: #ffffff !important;
        
        --default-button-bg: #f1f5f9 !important;
        --default-button-hover-bg: #e2e8f0 !important;
        --default-button-fg: #334155 !important;
    }

    /* Font Family Overrides */
    body, input, select, textarea, button, .module, #header, div.breadcrumbs {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
    }

    /* UI Polishing & Customizations */
    #header {
        background: linear-gradient(135deg, #022c22 0%, #064e3b 100%) !important;
        padding: 15px 40px !important;
        border-bottom: 3px solid #f97316 !important;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08) !important;
    }

    #branding h1 {
        font-weight: 700 !important;
        letter-spacing: -0.5px !important;
    }

    div.breadcrumbs {
        background: #ffffff !important;
        border-bottom: 1px solid #e2e8f0 !important;
        padding: 10px 40px !important;
        font-size: 13px !important;
        font-weight: 500 !important;
    }

    div.breadcrumbs a {
        color: #16a34a !important;
    }

    /* Main Container layout styling */
    #content {
        padding: 30px 40px !important;
    }

    /* Dashboard Modules (cards) styling */
    .module {
        background: #ffffff !important;
        border: 1px solid #e2e8f0 !important;
        border-radius: 12px !important;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05) !important;
        overflow: hidden !important;
        margin-bottom: 25px !important;
    }

    .module caption, .module h2 {
        background: #f8fafc !important;
        color: #0f2d1e !important;
        font-weight: 700 !important;
        border-bottom: 1px solid #f1f5f9 !important;
        padding: 12px 18px !important;
        font-size: 14px !important;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .module td, .module th {
        padding: 12px 18px !important;
        font-size: 13px !important;
    }

    /* Tables & lists styling */
    thead th {
        background: #f8fafc !important;
        border-bottom: 2px solid #e2e8f0 !important;
        color: #475569 !important;
        font-weight: 600 !important;
    }

    tr.row1 {
        background: #ffffff !important;
    }

    tr.row2 {
        background: #f8fafc !important;
    }

    tr:hover {
        background: #f0fdf4 !important; /* Soft green hover row */
    }

    /* Buttons styling */
    input[type=submit], input[type=button], .button, a.button {
        border-radius: 8px !important;
        padding: 8px 16px !important;
        font-weight: 600 !important;
        text-transform: none !important;
        border: none !important;
        box-shadow: 0 4px 6px -1px rgba(234, 88, 12, 0.2) !important;
        transition: all 0.15s ease !important;
    }

    input[type=submit]:hover, input[type=button]:hover, .button:hover {
        transform: translateY(-1px) !important;
        box-shadow: 0 6px 12px -1px rgba(234, 88, 12, 0.3) !important;
    }

    /* Form Inputs styling */
    input[type=text], input[type=password], input[type=email], input[type=url], input[type=number], select, textarea {
        border-radius: 8px !important;
        border: 1px solid #cbd5e1 !important;
        padding: 8px 12px !important;
        transition: all 0.15s ease !important;
        font-size: 13px !important;
    }

    input[type=text]:focus, input[type=password]:focus, select:focus, textarea:focus {
        border-color: #f97316 !important;
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15) !important;
        outline: none !important;
    }

    /* Action log and sidebar styling */
    #content-related {
        background: #ffffff !important;
        border: 1px solid #e2e8f0 !important;
        border-radius: 12px !important;
        padding: 20px !important;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05) !important;
    }

    #content-related h2 {
        color: #0f2d1e !important;
        font-weight: 700 !important;
        font-size: 14px !important;
        margin-bottom: 15px !important;
    }

    .dashboard .module table th {
        width: auto !important;
    }

    /* Message lists/banners */
    ul.messagelist li.info {
        background: #f0fdf4 !important;
        border-left: 5px solid #16a34a !important;
        color: #166534 !important;
        border-radius: 6px !important;
    }
</style>
{% endblock %}
